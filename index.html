<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
  <title>Quiz Website</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <style type="text/css">
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 20px auto; }
   .question { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
   .options label { display: block; margin: 8px 0; cursor: pointer; }
    #result { font-size: 20px; font-weight: bold; margin-top: 20px; }
   .correct { color: green; border-color: green; }
   .wrong { color: red; border-color: red; }
    input[type="button"] { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-right: 10px; }
  </style>
  <script type="text/javascript">
    //<![CDATA[
    function checkQuiz() {
      var score = 0;
      var total = 3;
      var answers = ["b", "a", "c"];
      var resultDiv = document.getElementById("result");
      resultDiv.innerHTML = "";
      
      for(var i = 1; i <= total; i++) {
        var q = document.getElementsByName("q" + i);
        var userAns = "";
        var questionDiv = document.getElementById("question" + i);
        
        for(var j = 0; j < q.length; j++) {
          if(q[j].checked) { userAns = q[j].value; break; }
        }
        
        if(userAns === "") {
          questionDiv.className = "question";
          continue;
        }
        
        if(userAns === answers[i-1]) {
          score++;
          questionDiv.className = "question correct";
        } else {
          questionDiv.className = "question wrong";
        }
      }
      resultDiv.innerHTML = "Your Score: " + score + " / " + total;
    }
    
    function resetQuiz() {
      var inputs = document.getElementsByTagName("input");
      for(var i = 0; i < inputs.length; i++) {
        if(inputs[i].type == "radio") inputs[i].checked = false;
      }
      var questions = document.getElementsByClassName("question");
      for(var i = 0; i < questions.length; i++) {
        questions[i].className = "question";
      }
      document.getElementById("result").innerHTML = "";
    }
    //]]>
  </script>
</head>
<body>
  <h1>Web Development Quiz</h1>
  
  <form id="quizForm" action="">
    <div class="question" id="question1">
      <p><strong>1. HTML का फुल फॉर्म क्या है?</strong></p>
      <div class="options">
        <label><input type="radio" name="q1" value="a" /> Hyper Text Makeup Language</label>
        <label><input type="radio" name="q1" value="b" /> Hyper Text Markup Language</label>
        <label><input type="radio" name="q1" value="c" /> High Text Markup Language</label>
      </div>
    </div>
    
    <div class="question" id="question2">
      <p><strong>2. CSS का use क्या है?</strong></p>
      <div class="options">
        <label><input type="radio" name="q2" value="a" /> Styling</label>
        <label><input type="radio" name="q2" value="b" /> Database</label>
        <label><input type="radio" name="q2" value="c" /> Server</label>
      </div>
    </div>
    
    <div class="question" id="question3">
      <p><strong>3. JavaScript कौन सी language है?</strong></p>
      <div class="options">
        <label><input type="radio" name="q3" value="a" /> Markup</label>
        <label><input type="radio" name="q3" value="b" /> Styling</label>
        <label><input type="radio" name="q3" value="c" /> Scripting</label>
      </div>
    </div>
    
    <input type="button" value="Submit Quiz" onclick="checkQuiz()" />
    <input type="button" value="Reset" onclick="resetQuiz()" />
  </form>
  
  <div id="result"></div>
  
</body>
</html>
